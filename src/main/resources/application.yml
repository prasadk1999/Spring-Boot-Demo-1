spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres?options=-c%20timezone=Asia/Kolkata
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  application:
    name: demo
